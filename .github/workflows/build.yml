name: Build miniHSM Firmware

on:
  push:
    branches: [main]
    paths: ['firmware/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Inyectar credenciales en sdkconfig.defaults
        run: |
          if [ -n "$WIFI_SSID" ]; then
            echo "CONFIG_WIFI_SSID=\"$WIFI_SSID\"" >> firmware/sdkconfig.defaults
            echo "CONFIG_WIFI_PASS=\"$WIFI_PASS\""  >> firmware/sdkconfig.defaults
            echo "WiFi inyectado desde Secrets"
          else
            echo "Sin WiFi secrets — binario arranca en modo provisioning"
          fi
          if [ -n "$SERVERHSM_URL" ]; then
            echo "CONFIG_SERVERHSM_URL=\"$SERVERHSM_URL\"" >> firmware/sdkconfig.defaults
          fi
        env:
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASS: ${{ secrets.WIFI_PASS }}
          SERVERHSM_URL: ${{ secrets.SERVERHSM_URL }}

      - name: Build con ESP-IDF v5.4.4
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.4
          target: esp32s3
          path: firmware
          command: idf.py build

      - name: Crear merged binary para flash directo
        run: |
          pip install esptool -q
          cd firmware/build
          python -m esptool --chip esp32s3 merge-bin \
            -o minihsm-merged.bin \
            --flash-mode dio \
            --flash-freq 80m \
            --flash-size 16MB \
            0x0000  bootloader/bootloader.bin \
            0x8000  partition_table/partition-table.bin \
            0x10000 minihsm.bin
          echo "--- Binarios generados ---"
          ls -lh *.bin

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: minihsm-firmware-${{ github.run_number }}
          retention-days: 90
          path: |
            firmware/build/minihsm-merged.bin
            firmware/build/minihsm.bin
            firmware/build/bootloader/bootloader.bin
            firmware/build/partition_table/partition-table.bin

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firmware-v${{ github.run_number }}
          name: "miniHSM Firmware build #${{ github.run_number }}"
          body: |
            Compilado con ESP-IDF v5.4.4 para ESP32-S3.
            ## Flash rápido (un solo archivo)
            ```
            esptool.py --chip esp32s3 --port COM7 write_flash 0x0 minihsm-merged.bin
            ```
            ## Configurar WiFi (si no hay credenciales embebidas)
            ```
            curl -X POST http://<IP-ESP32>/provision/wifi \
              -H "Content-Type: application/json" \
              -d '{"ssid":"TuWiFi","pass":"TuPass","kuser":"...","timestamp":...,"nonce":"..."}'
            ```
          files: |
            firmware/build/minihsm-merged.bin
            firmware/build/minihsm.bin
            firmware/build/bootloader/bootloader.bin
            firmware/build/partition_table/partition-table.bin
